<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Links</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

    <div class="profile">

      <p class="location">London, United Kingdom</p>
      <p class="title">Front-end developer and avid reader</p>
    </div>
    <ul class="links">
      <li><a href="#" target="_self">GitHub</a></li>
      <li><a href="#" target="_self">Frontend Mentor</a></li>
      <li><a href="#" target="_self">LinkedIn</a></li>
      <li><a href="#" target="_self">Twitter</a></li>
      <li><a href="#" target="_self">Instagram</a></li>
    </ul>
  </main>
</body>
</html>
