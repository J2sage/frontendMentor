<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base Apparel Page</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <section class="left">
      <div class="logo">
        <img src="../images/logo-apparel.svg" alt="apparel-logo">
      </div>
      <div class="hero-mobile">
        <img src="../images/hero-mobile.jpg" alt="hero-mobile">
      </div>
      <div class="info">
        <p class="return">
          <span>WE'RE</span><br> COMING <br> SOON
        </p>

        <p class="mssg">
          Hello fellow shoppers! We're currently building our new fashion store. Add your email to stay up-to-date with announcements and launch our deals.
        </p>
      </div>
      <div class="input-container">
        <input type="text" id="email-input" placeholder="Email Address">
        <img src="../images/icon-error.svg" class="error-img" alt="">
        <button id="btn" type="submit">
          <img src="../images/icon-arrow.svg" alt="arrow">
        </button>
        <p class="error">Please provide a valid email</p>
      </div>
    </section>
    <section class="hero">
      <img src="../images/hero-desktop.jpg" class="hero-image" alt="hero-picture">
    </section>
  </main>

  <script src="index.js"></script>
  
</body>
</html>
